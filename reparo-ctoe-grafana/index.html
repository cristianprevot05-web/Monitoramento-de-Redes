<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reparo CTOE - Grafana Business Text</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="ctoShell" class="cto-shell">
    <header class="cto-hero">
      <div class="cto-hero__mesh"></div>
      <div class="cto-hero__glow"></div>

      <div class="cto-hero__left">
        <div class="cto-brand">
          <div class="cto-brand__logo">NF</div>

          <div class="cto-brand__text">
            <div class="cto-kicker">Infraestrutura • Atendimento técnico</div>
            <h1 class="cto-title">Reparo CTOE</h1>
            <div id="ctoSubtitle" class="cto-subtitle">Carregando ordens de serviço...</div>
          </div>
        </div>
      </div>

      <div class="cto-hero__right">
        <div class="cto-switch cto-switch--single" aria-label="Visão atual">
          <button class="cto-switch__btn is-active" type="button">O.S.</button>
        </div>

        <div class="cto-hero__meta">
          <span id="ctoScope" class="cto-chip cto-chip--scope">Infraestrutura • Reparo CTOE</span>
          <span id="ctoStamp" class="cto-stamp">--</span>
        </div>

        <div class="cto-searchbar">
          <input
            id="ctoSearch"
            class="cto-search"
            type="text"
            placeholder="Buscar por O.S., protocolo, técnico, cliente, CTO, endereço..."
          />
          <button id="ctoClearSearch" class="cto-btn" type="button">Limpar</button>
        </div>
      </div>
    </header>

    <section class="cto-kpis">
      <article class="cto-kpi cto-kpi--all">
        <div class="cto-kpi__head">
          <span class="cto-kpi__icon">O</span>
          <span class="cto-kpi__label">O.S.</span>
        </div>
        <strong id="ctoKTotal" class="cto-kpi__value">--</strong>
      </article>

      <article class="cto-kpi cto-kpi--open">
        <div class="cto-kpi__head">
          <span class="cto-kpi__icon">A</span>
          <span class="cto-kpi__label">Abertas</span>
        </div>
        <strong id="ctoKOpen" class="cto-kpi__value">--</strong>
      </article>

      <article class="cto-kpi cto-kpi--exec">
        <div class="cto-kpi__head">
          <span class="cto-kpi__icon">E</span>
          <span class="cto-kpi__label">Execução</span>
        </div>
        <strong id="ctoKExec" class="cto-kpi__value">--</strong>
      </article>
    </section>

    <section class="cto-main">
      <div class="cto-feed-panel">
        <div class="cto-panel-head">
          <div class="cto-panel-head__left">
            <span class="cto-panel-head__dot"></span>
            <div>
              <div id="ctoPanelTitle" class="cto-panel-title">Fila operacional</div>
              <div id="ctoPanelMeta" class="cto-panel-meta">--</div>
            </div>
          </div>

          <div class="cto-panel-head__stats">
            <span id="ctoQuickVisible" class="cto-mini-chip">-- O.S.</span>
            <span id="ctoQuickActivity" class="cto-mini-chip cto-mini-chip--accent">Última atividade --</span>
          </div>
        </div>

        <div id="ctoFeed" class="cto-feed">
          <div class="cto-empty">
            <strong>Carregando O.S...</strong>
            <span>Aguarde enquanto o painel organiza os registros.</span>
          </div>
        </div>
      </div>
    </section>

    <div id="ctoToast" class="cto-toast" aria-hidden="true">Copiado</div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
